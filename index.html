<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}

// ITEM SYSTEM
function addItem(name = "", price = 0) {
  const container = document.getElementById("items");

  const div = document.createElement("div");
  div.className = "item";

  div.innerHTML =
    '<input type="text" placeholder="Item" value="' + name + '" class="item-name">' +
    '<input type="number" placeholder="Price" value="' + price + '" class="item-price" oninput="calculateTotal()">' +
    '<button onclick="this.parentElement.remove(); calculateTotal()">X</button>';

  container.appendChild(div);
}

function calculateTotal() {
  let total = 0;

  document.querySelectorAll(".item-price").forEach(input => {
    total += Number(input.value) || 0;
  });

  document.getElementById("total").innerText = total.toFixed(2);
}

function getItems() {
  const items = [];

  document.querySelectorAll(".item").forEach(div => {
    const name = div.querySelector(".item-name").value;
    const price = div.querySelector(".item-price").value;
    items.push({ name, price });
  });

  return items;
}

// QUOTES
function getQuotes() {
  return JSON.parse(localStorage.getItem("quotes") || "[]");
}

function saveQuotes(quotes) {
  localStorage.setItem("quotes", JSON.stringify(quotes));
}

function saveQuote() {
  const customer = document.getElementById("customer").value;
  const description = document.getElementById("description").value;
  const total = document.getElementById("total").innerText;
  const items = getItems();

  if (!customer || total === "0.00") {
    alert("Add customer and items first");
    return;
  }

  const quotes = getQuotes();

  quotes.push({
    id: Date.now(),
    customer,
    description,
    items,
    total,
    created: new Date().toLocaleString()
  });

  saveQuotes(quotes);
  alert("Quote saved!");
}

function viewQuotes() {
  const screen = document.getElementById("quotesScreen");
  const container = document.getElementById("quotesList");

  screen.style.display = "block";

  const quotes = getQuotes();
  container.innerHTML = "";

  if (quotes.length === 0) {
    container.innerHTML = "<p>No quotes yet</p>";
    return;
  }

  quotes.forEach(q => {
    let html = "<div style='border:1px solid #ccc; padding:10px; margin:10px 0;'>";
    html += "<strong>" + q.customer + "</strong><br>";
    html += q.description + "<br><ul>";

    q.items.forEach(i => {
      html += "<li>" + i.name + " - $" + i.price + "</li>";
    });

    html += "</ul>Total: $" + q.total + "</div>";

    container.innerHTML += html;
  });
}

function closeQuotes() {
  document.getElementById("quotesScreen").style.display = "none";
}

// JOBS
function getJobs() {
  return JSON.parse(localStorage.getItem("jobs") || "[]");
}

function saveJobs(jobs) {
  localStorage.setItem("jobs", JSON.stringify(jobs));
}

function convertToJob() {
  const customer = document.getElementById("customer").value;
  const description = document.getElementById("description").value;
  const total = document.getElementById("total").innerText;
  const items = getItems();

  if (!customer || total === "0.00") {
    alert("Add customer and items first");
    return;
  }

  const jobs = getJobs();

  jobs.push({
    id: Date.now(),
    customer,
    description,
    items,
    total,
    created: new Date().toLocaleString()
  });

  saveJobs(jobs);
  alert("Job created!");
}

function viewJobs() {
  const screen = document.getElementById("jobsScreen");
  const container = document.getElementById("jobsList");

  screen.style.display = "block";

  const jobs = getJobs();
  container.innerHTML = "";

  if (jobs.length === 0) {
    container.innerHTML = "<p>No jobs yet</p>";
    return;
  }

  jobs.forEach(j => {
    let html = "<div style='border:1px solid #ccc; padding:10px; margin:10px 0;'>";
    html += "<strong>" + j.customer + "</strong><br>";
    html += j.description + "<br><ul>";

    j.items.forEach(i => {
      html += "<li>" + i.name + " - $" + i.price + "</li>";
    });

    html += "</ul>Total: $" + j.total + "</div>";

    container.innerHTML += html;
  });
}

function closeJobs() {
  document.getElementById("jobsScreen").style.display = "none";
}

// QUOTE PREVIEW
function generateQuote() {
  const customer = document.getElementById("customer").value;
  const description = document.getElementById("description").value;
  const total = document.getElementById("total").innerText;
  const items = getItems();

  let html = "<strong>" + customer + "</strong><br>" + description + "<ul>";

  items.forEach(i => {
    html += "<li>" + i.name + " - $" + i.price + "</li>";
  });

  html += "</ul><strong>Total: $" + total + "</strong>";

  document.getElementById("quoteOutput").innerHTML = html;
}

// INIT
window.onload = function() {
  addItem();
};
</script>
