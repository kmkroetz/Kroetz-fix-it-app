<script>
// STORAGE
function getData(key) {
  return JSON.parse(localStorage.getItem(key)) || [];
}
function saveData(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

// CUSTOMERS
function addCustomer(name) {
  let customers = getData('customers');
  customers.push({ id: Date.now(), name });
  saveData('customers', customers);
}

// QUOTES
function addQuote(customerId, desc, price) {
  let quotes = getData('quotes');
  quotes.push({
    id: Date.now(),
    customerId,
    desc,
    price,
    status: "Draft"
  });
  saveData('quotes', quotes);
}

// APPROVE QUOTE → CREATE JOB
function approveQuote(quoteId) {
  let quotes = getData('quotes');
  let jobs = getData('jobs');

  let quote = quotes.find(q => q.id === quoteId);
  quote.status = "Approved";

  jobs.push({
    id: Date.now(),
    quoteId: quote.id,
    customerId: quote.customerId,
    desc: quote.desc,
    status: "Scheduled",
    hours: 0
  });

  saveData('quotes', quotes);
  saveData('jobs', jobs);
}

// COMPLETE JOB → CREATE INVOICE
function completeJob(jobId) {
  let jobs = getData('jobs');
  let invoices = getData('invoices');

  let job = jobs.find(j => j.id === jobId);
  job.status = "Done";

  let laborTotal = job.hours * 90; // your rate

  invoices.push({
    id: Date.now(),
    jobId: job.id,
    customerId: job.customerId,
    total: laborTotal,
    status: "Unpaid"
  });

  saveData('jobs', jobs);
  saveData('invoices', invoices);
}

// MARK INVOICE PAID
function markPaid(invoiceId) {
  let invoices = getData('invoices');
  let invoice = invoices.find(i => i.id === invoiceId);
  invoice.status = "Paid";
  saveData('invoices', invoices);
}
</script>
